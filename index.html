<script type="text/babel" data-presets="react">

// ================================================================
// 設定（Supabase接続情報・設定済み）
// ================================================================
const CONFIG = {
  SUPABASE_URL: "https://itemryixfrhltzviwsim.supabase.co",
  SUPABASE_ANON_KEY: "sb_publishable_xfgcViAYVnN2F-EfEhHo8Q_ben2GYHT",
  HOUSEHOLD_ID: "8561b7f7-935c-463e-8b8e-f97210b6ce7b",
};
// ================================================================

const { useState, useEffect, useCallback, useMemo } = React;

// ---------- デザイントークン（トイボックス風） ----------
const INK = "#22324A";
const YELLOW = "#FFC838";

// ---------- 定数 ----------
const OWNERS = [
  { id: "home", label: "家", color: "#2E9E44", bg: "#E3F6E7" },
  { id: "me", label: "けんと", color: "#2E7CD6", bg: "#E4F0FD" },
  { id: "wife", label: "みさ", color: "#E0508F", bg: "#FDE7F1" },
];
const ownerOf = (id) => OWNERS.find((o) => o.id === id) || OWNERS[0];

const GENRES = [
  { id: "food", label: "食費", emoji: "🍙", color: "#D97706", bg: "#FEF3C7" },
  { id: "daily", label: "日用品", emoji: "🧺", color: "#2E7CD6", bg: "#E4F0FD" },
  { id: "social", label: "交際費", emoji: "🍻", color: "#7C3AED", bg: "#EDE9FE" },
  { id: "misc", label: "雑費", emoji: "📦", color: "#64748B", bg: "#EEF2F7" },
  { id: "utility", label: "光熱費", emoji: "💡", color: "#EA580C", bg: "#FFEDD5" },
  { id: "water", label: "水道代", emoji: "🚰", color: "#0284C7", bg: "#E0F2FE" },
  { id: "rent", label: "家賃", emoji: "🏠", color: "#059669", bg: "#D1FAE5" },
];
const genreOf = (id) => GENRES.find((g) => g.id === id) || GENRES[3];

// よく使うお店の初期候補（履歴で2回以上使ったお店も自動で追加されます）
const STORE_SEEDS = ["ライフ", "サンディ", "コープ", "ココカラファイン", "無印良品", "ユニクロ", "ダイソー"];

const DEFAULT_DATA = {
  cards: [
    { id: "c1", name: "楽天カード①", closingDay: 27, cardOwner: "me" },
    { id: "c2", name: "三井住友", closingDay: 27, cardOwner: "me" },
    { id: "c3", name: "楽天カード②", closingDay: 27, cardOwner: "wife" },
  ],
  expenses: [],
  presets: [],
  settlements: {},
};

// ---------- 日付ユーティリティ ----------
const pad = (n) => String(n).padStart(2, "0");
const toISO = (d) => `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`;
const todayISO = () => toISO(new Date());
const daysInMonth = (y, m) => new Date(y, m + 1, 0).getDate();
const fmtMD = (iso) => {
  const [, m, d] = iso.split("-");
  return `${Number(m)}/${Number(d)}`;
};
const fmtYen = (n) => "¥" + Math.round(n).toLocaleString("ja-JP");

function billingPeriod(closingDay, y, m) {
  const endDay = Math.min(closingDay, daysInMonth(y, m));
  const end = new Date(y, m, endDay);
  const pm = m === 0 ? 11 : m - 1;
  const py = m === 0 ? y - 1 : y;
  const prevEndDay = Math.min(closingDay, daysInMonth(py, pm));
  const start = new Date(py, pm, prevEndDay + 1);
  return { start: toISO(start), end: toISO(end) };
}
const inPeriod = (iso, p) => iso >= p.start && iso <= p.end;

// ---------- データ移行 ----------
function migrate(d) {
  const out = { ...DEFAULT_DATA, ...d };
  out.settlements = d.settlements || {};
  // 口座引落は廃止
  out.cards = (d.cards || DEFAULT_DATA.cards).filter((c) => c.id !== "bank");
  if (out.cards.length === 0) out.cards = DEFAULT_DATA.cards;
  // 3か月より前の記録は自動整理（今月＋過去2か月を保持）
  const n = new Date();
  const cutoff = toISO(new Date(n.getFullYear(), n.getMonth() - 2, 1));
  out.expenses = (d.expenses || [])
    .filter((e) => e.date >= cutoff)
    .map((e) => ({
      ...e,
      lines: e.lines.map((l) => ({ ...l, genre: l.genre || "misc" })),
    }));
  out.presets = (d.presets || []).map((p) => ({ ...p, genre: p.genre || "misc" }));
  return out;
}

// ---------- Supabase ストレージ ----------
async function rpc(fn, body) {
  const headers = {
    "Content-Type": "application/json",
    apikey: CONFIG.SUPABASE_ANON_KEY,
  };
  if (CONFIG.SUPABASE_ANON_KEY.startsWith("eyJ")) {
    headers.Authorization = `Bearer ${CONFIG.SUPABASE_ANON_KEY}`;
  }
  const res = await fetch(`${CONFIG.SUPABASE_URL}/rest/v1/rpc/${fn}`, {
    method: "POST",
    headers,
    body: JSON.stringify(body),
  });
  if (!res.ok) throw new Error(`Supabase ${fn} failed: ${res.status}`);
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}

async function loadData() {
  const result = await rpc("get_kakei", { hid: CONFIG.HOUSEHOLD_ID });
  if (result) return migrate(result);
  return DEFAULT_DATA;
}
async function saveData(data) {
  try {
    await rpc("set_kakei", { hid: CONFIG.HOUSEHOLD_ID, payload: data });
    return true;
  } catch (e) {
    console.error("保存に失敗", e);
    return false;
  }
}

// ---------- 共通スタイル ----------
const S = {

  },

    fontSize: 11,
    fontWeight: 700,
    letterSpacing: "0.1em",

    fontWeight: 700,
    cursor: "pointer",
  },
};

function OwnerChips({ value, onChange, size }) {
  return (
    <div style={{ display: "flex", gap: 6 }}>
      {OWNERS.map((o) => (
        <button
          key={o.id}

function OwnerDot({ owner }) {
  const o = ownerOf(owner);
  return (

}

}

// ---------- 入力タブ ----------
function InputTab({ data, mutate, onSaved }) {
  const [date, setDate] = useState(todayISO());
  const [cardId, setCardId] = useState(data.cards[0] ? data.cards[0].id : "");
  const [store, setStore] = useState("");
  const emptyLine = () => ({ name: "", amount: "", owner: "home", genre: "food" });
  const [lines, setLines] = useState([emptyLine()]);
  const [saving, setSaving] = useState(false);
  const [msg, setMsg] = useState("");

  const total = lines.reduce((s, l) => s + (Number(l.amount) || 0), 0);

  // お店候補: 2回以上使ったお店（回数順）＋定番リスト
  const storeSuggestions = useMemo(() => {
    const counts = {};
    data.expenses.forEach((e) => {
      const s = (e.store || "").trim();
      if (s) counts[s] = (counts[s] || 0) + 1;
    });
    const frequent = Object.entries(counts)
      .filter(([, c]) => c >= 2)
      .sort((a, b) => b[1] - a[1])
      .map(([s]) => s);
    const merged = [...frequent];
    STORE_SEEDS.forEach((s) => {
      if (!merged.includes(s)) merged.push(s);
    });
    return merged.slice(0, 10);
  }, [data.expenses]);

  const setLine = (i, patch) =>
    setLines((ls) => ls.map((l, j) => (j === i ? { ...l, ...patch } : l)));
  const addLine = () => setLines((ls) => [...ls, emptyLine()]);
  const removeLine = (i) => setLines((ls) => ls.filter((_, j) => j !== i));
  const addPreset = (p) =>
    setLines((ls) => {
      const base = ls.length === 1 && !ls[0].name && !ls[0].amount ? [] : ls;
      return [
        ...base,
        {
          name: p.name,
          amount: p.amount > 0 ? String(p.amount) : "",
          owner: p.owner,
          genre: p.genre || "misc",
        },
      ];
    });

  const save = async () => {
    const valid = lines.filter((l) => Number(l.amount) > 0);
    if (!cardId) return setMsg("カードを選んでください");
    if (valid.length === 0) return setMsg("金額を入力してください");
    setSaving(true);
    const expense = {
      id: "e" + Date.now(),
      date,
      cardId,
      store: store.trim(),
      lines: valid.map((l) => ({
        name: l.name.trim(),
        amount: Number(l.amount),
        owner: l.owner,
        genre: l.genre || "misc",
      })),
    };
    const ok = await mutate((d) => ({ ...d, expenses: [...d.expenses, expense] }));
    setSaving(false);
    if (ok) {
      setStore("");
      setLines([emptyLine()]);
      setMsg("");
      onSaved();
    } else {
      setMsg("保存に失敗しました。通信環境を確認して再度お試しください。");
    }
  };

  return (
    <div>
      <div style={S.card}>
        <div style={S.label}>日付とカード</div>
        <input
          type="date"
          value={date}
          onChange={(e) => setDate(e.target.value)}
          style={{ ...S.input, marginBottom: 10 }}
        />
        <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
          {data.cards.map((c) => (
            <button key={c.id} onClick={() => setCardId(c.id)} style={S.chip(cardId === c.id, INK, "#FFF3CF")}>
              {c.name}
            </button>
          ))}
        </div>
        <input
          placeholder="お店・支払い先（任意）"
          value={store}
          onChange={(e) => setStore(e.target.value)}
          style={{ ...S.input, marginTop: 10 }}
        />
        {storeSuggestions.length > 0 && (
          <div style={{ display: "flex", gap: 6, overflowX: "auto", marginTop: 8, paddingBottom: 2, WebkitOverflowScrolling: "touch" }}>
            {storeSuggestions.map((s) => (
              <button
                key={s}
                onClick={() => setStore(s)}
                style={{ ...S.chip(store === s, INK, "#FFF3CF"), padding: "5px 12px", fontSize: 13, flexShrink: 0 }}
              >
                {s}
              </button>
            ))}
          </div>
        )}
      </div>

      <div style={S.card}>
        <div style={S.label}>内訳 — ジャンルを選んで金額を入れるだけでOK</div>
        {lines.map((l, i) => (
          <div
            key={i}
            style={{ border: "2px solid #E4EAF2", borderRadius: 16, padding: 12, marginBottom: 10, background: "#FBFDFF" }}
          >
            <div style={{ display: "flex", gap: 6, overflowX: "auto", paddingBottom: 4, marginBottom: 8, WebkitOverflowScrolling: "touch" }}>
              {GENRES.map((g) => (
                <button
                  key={g.id}
                  onClick={() => setLine(i, { genre: g.id })}
                  style={{
                    ...S.chip(l.genre === g.id, g.color, g.bg),
                    padding: "5px 11px",
                    fontSize: 13,
                    flexShrink: 0,
                  }}
                >
                  {g.emoji} {g.label}
                </button>
              ))}
            </div>
            <div style={{ display: "flex", gap: 8, marginBottom: 8 }}>
              <input
                placeholder="品名（任意）"
                value={l.name}
                onChange={(e) => setLine(i, { name: e.target.value })}
                style={{ ...S.input, flex: 1, padding: "8px 10px", fontSize: 15 }}
              />
              <input
                placeholder="金額"
                type="number"
                inputMode="numeric"
                value={l.amount}
                onChange={(e) => setLine(i, { amount: e.target.value })}
                style={{ ...S.input, width: 100, padding: "8px 10px", fontSize: 15, textAlign: "right" }}
              />
            </div>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <OwnerChips value={l.owner} onChange={(v) => setLine(i, { owner: v })} size="sm" />
              {lines.length > 1 && (
                <button onClick={() => removeLine(i)} style={{ ...S.dangerBtn, border: "none", background: "none", padding: "4px 8px" }}>
                  削除
                </button>
              )}
            </div>
          </div>
        ))}
        <button
          onClick={addLine}
          style={{
            width: "100%",
            background: "#F2F7FC",
            border: "2px dashed #B9C8DA",
            borderRadius: 14,
            padding: "10px 0",
            fontSize: 14,
            fontWeight: 700,
            color: "#5A6B82",
            cursor: "pointer",
          }}
        >
          ＋ 行を追加
        </button>

        {data.presets.length > 0 && (
          <React.Fragment>
            <div style={{ ...S.label, marginTop: 14 }}>よく使う項目（タップで追加）</div>
            <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
              {data.presets.map((p) => {
                const g = genreOf(p.genre);
                return (
                  <button
                    key={p.id}
                    onClick={() => addPreset(p)}
                    style={{ ...S.chip(true, g.color, g.bg), fontSize: 13, padding: "5px 12px" }}
                  >
                    {g.emoji} {p.name}
                    {p.amount > 0 ? " " + fmtYen(p.amount) : ""}
                  </button>
                );
              })}
            </div>
          </React.Fragment>
        )}
      </div>

      <div style={{ ...S.card, marginBottom: 12 }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
          <span style={{ fontSize: 14, fontWeight: 700, color: "#5A6B82" }}>合計</span>
          <span style={{ ...S.num, fontSize: 24, fontWeight: 800 }}>{fmtYen(total)}</span>
        </div>
        {msg && <div style={{ color: "#C24A4A", fontSize: 13, marginBottom: 8, fontWeight: 700 }}>{msg}</div>}
        <button onClick={save} disabled={saving} style={{ ...S.btnPrimary, opacity: saving ? 0.6 : 1 }}>
          {saving ? "保存中…" : "記録する ✨"}
        </button>
      </div>
    </div>
  );
}

// ---------- 履歴タブ ----------
function HistoryTab({ data, mutate }) {
  const now = new Date();
  const months = useMemo(() => {
    const arr = [];
    for (let i = 0; i < 3; i++) {
      const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
      arr.push({ key: `${d.getFullYear()}-${d.getMonth() + 1}`, y: d.getFullYear(), m: d.getMonth(), label: `${d.getMonth() + 1}月` });
    }
    return arr;
  }, []);
  const [monthKey, setMonthKey] = useState(months[0].key);
  const [genreFilter, setGenreFilter] = useState(null);
  const [openId, setOpenId] = useState(null);

  const sel = months.find((mo) => mo.key === monthKey) || months[0];

  const monthExpenses = useMemo(
    () =>
      data.expenses
        .filter((e) => {
          const [ey, em] = e.date.split("-").map(Number);
          return ey === sel.y && em - 1 === sel.m;
        })
        .sort((a, b) => (a.date < b.date ? 1 : -1)),
    [data.expenses, sel]
  );

  // ジャンル別合計
  const genreTotals = useMemo(() => {
    const t = {};
    monthExpenses.forEach((e) => e.lines.forEach((l) => (t[l.genre] = (t[l.genre] || 0) + l.amount)));
    return t;
  }, [monthExpenses]);
  const monthTotal = Object.values(genreTotals).reduce((s, v) => s + v, 0);

  const shown = genreFilter
    ? monthExpenses
        .map((e) => ({ ...e, lines: e.lines.filter((l) => l.genre === genreFilter) }))
        .filter((e) => e.lines.length > 0)
    : monthExpenses;

  const cardName = (id) => {
    const c = data.cards.find((c) => c.id === id);
    return c ? c.name : "不明";
  };
  const del = async (id) => {
    await mutate((d) => ({ ...d, expenses: d.expenses.filter((e) => e.id !== id) }));
  };
  const delLine = async (expId, targetLine) => {
    await mutate((d) => ({
      ...d,
      expenses: d.expenses
        .map((e) => {
          if (e.id !== expId) return e;
          const idx = e.lines.findIndex(
            (l) => l.name === targetLine.name && l.amount === targetLine.amount && l.owner === targetLine.owner && l.genre === targetLine.genre
          );
          return { ...e, lines: e.lines.filter((_, j) => j !== idx) };
        })
        .filter((e) => e.lines.length > 0),
    }));
  };

  return (
    <div>
      {/* 月切り替え */}
      <div style={{ display: "flex", gap: 8, margin: "14px 14px 0" }}>
        {months.map((mo) => (
          <button
            key={mo.key}
            onClick={() => {
              setMonthKey(mo.key);
              setGenreFilter(null);
            }}
            style={{ ...S.chip(monthKey === mo.key, INK, YELLOW), flex: 1, padding: "9px 0", fontWeight: 800 }}
          >
            {mo.label}
          </button>
        ))}
      </div>

      {/* ジャンル別合計 */}
      <div style={S.card}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 8 }}>

const navBtn = {
  border: `2px solid ${INK}`,
  background: "#fff",
  borderRadius: 12,
  width: 38,
  height: 38,
  fontSize: 18,
  cursor: "pointer",
  color: INK,
  fontWeight: 800,
  boxShadow: "3px 3px 0 rgba(34,50,74,0.15)",
};

function SettleTab({ data, mutate }) {
  const now = new Date();
  const [ym, setYm] = useState({ y: now.getFullYear(), m: now.getMonth() });
  const shift = (d) =>
    setYm(({ y, m }) => {
      const nm = m + d;
      return { y: y + Math.floor(nm / 12), m: ((nm % 12) + 12) % 12 };
    });

  const key = `${ym.y}-${ym.m + 1}`;
  const settled = !!data.settlements[key];

  const perCard = data.cards.map((card) => {
    const p = billingPeriod(card.closingDay, ym.y, ym.m);
    const sums = { home: 0, me: 0, wife: 0, total: 0 };
    data.expenses.forEach((e) => {
      if (e.cardId !== card.id || !inPeriod(e.date, p)) return;
      e.lines.forEach((l) => {
        sums[l.owner] += l.amount;
        sums.total += l.amount;
      });
    });
    return { card, p, sums };
  });

  // 集計: 家は折半
  let home = 0, ken = 0, misa = 0, paidK = 0, paidM = 0;
  perCard.forEach(({ card, sums }) => {
    home += sums.home;
    ken += sums.me;
    misa += sums.wife;
    if (card.cardOwner === "me") paidK += sums.total;
    else paidM += sums.total;
  });
  const kenBurden = ken + home / 2;
  const misaBurden = misa + home / 2;
  // みさが払うべき額 − みさが実際にカードで払った額（プラスなら みさ→けんと）
  const transfer = misaBurden - paidM;

  const toggleSettled = () =>
    mutate((d) => ({
      ...d,
      settlements: { ...d.settlements, [key]: !d.settlements[key] },
    }));

  const Row = ({ label, left, right, strong }) => (
    <div style={{ display: "flex", justifyContent: "space-between", padding: "7px 0", fontSize: strong ? 15 : 14, fontWeight: strong ? 800 : 700, borderTop: strong ? `2px solid ${INK}` : "1px dashed #E0E6EE" }}>
      <span style={{ color: strong ? INK : "#5A6B82" }}>{label}</span>
      <span style={{ ...S.num, display: "flex", gap: 14 }}>
        <span style={{ color: "#2E7CD6" }}>{left}</span>
        <span style={{ color: "#E0508F" }}>{right}</span>
      </span>
    </div>
  );

  return (
    <div>
      <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 18, margin: "16px 0 2px" }}>
        <button onClick={() => shift(-1)} style={navBtn}>‹</button>
        <div style={{ fontSize: 16, fontWeight: 800 }}>
          {ym.y}年{ym.m + 1}月 請求分
        </div>
        <button onClick={() => shift(1)} style={navBtn}>›</button>
      </div>

      {/* 精算ヒーロー */}
      <div
        style={{
          ...S.card,
          background: settled
            ? "linear-gradient(160deg, #2F7A4C 0%, #3C9E62 100%)"
            : `linear-gradient(160deg, ${INK} 0%, #2E4A7A 100%)`,
          color: "#fff",
          textAlign: "center",
          padding: "24px 16px",
        }}
      >
        <div style={{ fontSize: 12, letterSpacing: "0.14em", opacity: 0.85, fontWeight: 700 }}>
          {settled ? "✓ 精算済み" : transfer >= 0 ? "みさ → けんと に払う額" : "けんと → みさ に払う額"}
        </div>
        <div style={{ ...S.num, fontSize: 42, fontWeight: 800, margin: "6px 0 4px", color: settled ? "#fff" : "#FFD84D" }}>
          {fmtYen(Math.abs(transfer))}
        </div>
        <div style={{ fontSize: 12, opacity: 0.7, marginBottom: 14, fontWeight: 700 }}>
          家の分は自動で折半して計算しています
        </div>
        <button
          onClick={toggleSettled}
          style={{
            background: settled ? "rgba(255,255,255,0.15)" : "#fff",
            color: settled ? "#fff" : INK,
            border: settled ? "2px solid rgba(255,255,255,0.6)" : `2px solid ${INK}`,
            borderRadius: 999,
            padding: "10px 26px",
            fontSize: 14,
            fontWeight: 800,
            cursor: "pointer",
          }}
        >
          {settled ? "精算済みを取り消す" : "精算済みにする 🎉"}
        </button>
      </div>

      {/* 負担の内訳 */}
      <div style={S.card}>
        <div style={S.label}>負担の内訳</div>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", background: ownerOf("home").bg, border: `2px solid ${ownerOf("home").color}`, borderRadius: 12, padding: "10px 12px", marginBottom: 10 }}>
          <span style={{ fontWeight: 800, color: ownerOf("home").color }}>🏠 家の支出（折半）</span>
          <span style={{ ...S.num, fontWeight: 800, color: ownerOf("home").color }}>{fmtYen(home)}</span>
        </div>
        <div style={{ display: "flex", justifyContent: "flex-end", gap: 14, fontSize: 12, fontWeight: 800, marginBottom: 4 }}>
          <span style={{ color: "#2E7CD6" }}>けんと</span>
          <span style={{ color: "#E0508F" }}>みさ</span>
        </div>
        <Row label="家（半分ずつ）" left={fmtYen(home / 2)} right={fmtYen(home / 2)} />
        <Row label="個人の支出" left={fmtYen(ken)} right={fmtYen(misa)} />
        <Row label="負担合計" left={fmtYen(kenBurden)} right={fmtYen(misaBurden)} strong />
        <Row label="カードで支払済み" left={fmtYen(paidK)} right={fmtYen(paidM)} />
      </div>

      {/* カード別内訳 */}
      {perCard.map(({ card, p, sums }) => (
        <div key={card.id} style={S.card}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline" }}>
            <div style={{ fontSize: 15, fontWeight: 800 }}>{card.name}</div>
            <div style={{ ...S.num, fontSize: 16, fontWeight: 800 }}>{fmtYen(sums.total)}</div>
          </div>
          <div style={{ fontSize: 12, color: "#7A8698", margin: "3px 0 10px", fontWeight: 700 }}>
            {fmtMD(p.start)} 〜 {fmtMD(p.end)}（{card.closingDay === 31 ? "月末" : card.closingDay + "日"}締め）
          </div>
          <div style={{ display: "flex", gap: 8 }}>
            {OWNERS.map((o) => (
              <div key={o.id} style={{ flex: 1, background: o.bg, border: `1.5px solid ${o.color}`, borderRadius: 12, padding: "9px 0", textAlign: "center" }}>
                <div style={{ fontSize: 11, fontWeight: 800, color: o.color }}>{o.label}</div>
                <div style={{ ...S.num, fontSize: 14, fontWeight: 800, color: o.color }}>{fmtYen(sums[o.id])}</div>
              </div>
            ))}
          </div>
        </div>
      ))}
      <div style={{ height: 12 }} />
    </div>
  );
}

// ---------- グラフタブ ----------
function GraphTab({ data }) {
  const chartData = useMemo(() => {
    const now = new Date();
    const months = [];
    for (let i = 2; i >= 0; i--) {
      const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
      months.push({ y: d.getFullYear(), m: d.getMonth(), label: `${d.getMonth() + 1}月`, home: 0, me: 0, wife: 0 });
    }
    data.expenses.forEach((e) => {
      const [ey, em] = e.date.split("-").map(Number);
      const bucket = months.find((mo) => mo.y === ey && mo.m === em - 1);
      if (!bucket) return;
      e.lines.forEach((l) => {
        bucket[l.owner in bucket ? l.owner : "home"] += l.amount;
      });
    });
    return months;
  }, [data.expenses]);

  const maxTotal = Math.max(1, ...chartData.map((mo) => mo.home + mo.me + mo.wife));
  const last = chartData[chartData.length - 1];
  const totalThisMonth = last ? last.home + last.me + last.wife : 0;
  const CHART_H = 190;

  return (
    <div>
      <div style={S.card}>
        <div style={S.label}>今月の支出合計（暦月）</div>
        <div style={{ ...S.num, fontSize: 30, fontWeight: 800 }}>{fmtYen(totalThisMonth)}</div>
      </div>

      <div style={S.card}>
        <div style={S.label}>月別の支出（負担者別・直近3か月）</div>
        <div style={{ display: "flex", alignItems: "flex-end", gap: 14, height: CHART_H, marginTop: 12, padding: "0 10px" }}>
          {chartData.map((mo, i) => {
            const total = mo.home + mo.me + mo.wife;
            return (
              <div key={i} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", height: "100%" }}>
                <div style={{ ...S.num, fontSize: 11, color: "#5A6B82", marginBottom: 4, fontWeight: 800 }}>
                  {total > 0 ? (total >= 10000 ? Math.round(total / 1000) / 10 + "万" : total.toLocaleString()) : ""}
                </div>
                <div style={{ flex: 1, width: "100%", maxWidth: 56, display: "flex", flexDirection: "column", justifyContent: "flex-end", border: total > 0 ? `2px solid ${INK}` : "none", borderBottom: "none", borderRadius: "10px 10px 0 0", overflow: "hidden" }}>
                  {["wife", "me", "home"].map((oid) => {
                    const h = (mo[oid] / maxTotal) * (CHART_H - 30);
                    if (h <= 0) return null;
                    const o = ownerOf(oid);
                    return <div key={oid} style={{ height: h, background: o.color }} />;
                  })}
                </div>
              </div>
            );
          })}
        </div>
        <div style={{ display: "flex", gap: 14, marginTop: 0, padding: "0 10px", borderTop: `2px solid ${INK}` }}>
          {chartData.map((mo, i) => (
            <div key={i} style={{ flex: 1, textAlign: "center", fontSize: 13, color: INK, fontWeight: 800, paddingTop: 6 }}>
              {mo.label}
            </div>
          ))}
        </div>
        <div style={{ display: "flex", justifyContent: "center", gap: 14, marginTop: 12 }}>
          {OWNERS.map((o) => (
            <span key={o.id} style={{ fontSize: 12, color: "#5A6B82", display: "flex", alignItems: "center", gap: 4, fontWeight: 700 }}>
              <span style={{ width: 11, height: 11, borderRadius: 4, background: o.color, display: "inline-block", border: `1.5px solid ${INK}` }} />
              {o.label}
            </span>
          ))}
        </div>
        <div style={{ fontSize: 11, color: "#8A93A3", marginTop: 10, fontWeight: 700 }}>
          ※グラフは暦月（1日〜月末）で集計。カードの請求額は「精算」タブで締め日どおりに確認できます。
        </div>
      </div>
    </div>
  );
}

// ---------- 設定タブ ----------
function SettingsTab({ data, mutate }) {
  const [newPreset, setNewPreset] = useState({ name: "", amount: "", owner: "home", genre: "food" });

  const updateCard = (id, patch) =>
    mutate((d) => ({
      ...d,
      cards: d.cards.map((c) => (c.id === id ? { ...c, ...patch } : c)),
    }));
  const addCard = () =>
    mutate((d) => ({
      ...d,
      cards: [...d.cards, { id: "c" + Date.now(), name: "新しいカード", closingDay: 27, cardOwner: "me" }],
    }));
  const removeCard = (id) => mutate((d) => ({ ...d, cards: d.cards.filter((c) => c.id !== id) }));

  const addPreset = () => {
    if (!newPreset.name.trim()) return;
    mutate((d) => ({
      ...d,
      presets: [
        ...d.presets,
        {
          id: "p" + Date.now(),
          name: newPreset.name.trim(),
          amount: Number(newPreset.amount) || 0,
          owner: newPreset.owner,
          genre: newPreset.genre,
        },
      ],
    }));
    setNewPreset({ name: "", amount: "", owner: "home", genre: "food" });
  };
  const removePreset = (id) => mutate((d) => ({ ...d, presets: d.presets.filter((p) => p.id !== id) }));

  return (
    <div>
      <div style={S.card}>
        <div style={S.label}>カードと締め日</div>
        {data.cards.map((c) => (
          <div key={c.id} style={{ border: "2px solid #E4EAF2", borderRadius: 14, padding: 12, marginBottom: 10, background: "#FBFDFF" }}>
            <input
              value={c.name}
              onChange={(e) => updateCard(c.id, { name: e.target.value })}
              style={{ ...S.input, marginBottom: 8, fontSize: 15, padding: "8px 10px" }}
            />
            <div style={{ display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
              <span style={{ fontSize: 13, color: "#5A6B82", fontWeight: 700 }}>締め日</span>
              <select
                value={c.closingDay}
                onChange={(e) => updateCard(c.id, { closingDay: Number(e.target.value) })}

              >
                {Array.from({ length: 31 }, (_, i) => i + 1).map((d) => (
                  <option key={d} value={d}>
                    {d === 31 ? "月末" : d + "日"}
                  </option>
                ))}
              </select>
              <span style={{ fontSize: 13, color: "#5A6B82", fontWeight: 700 }}>名義</span>
              <select
                value={c.cardOwner}
                onChange={(e) => updateCard(c.id, { cardOwner: e.target.value })}
                style={{ ...S.input, width: 92, padding: "6px 8px", fontSize: 15 }}
              >
                <option value="me">けんと</option>
                <option value="wife">みさ</option>
              </select>
              <button onClick={() => removeCard(c.id)} style={{ ...S.dangerBtn, border: "none", background: "none", marginLeft: "auto", padding: "4px 8px" }}>
                削除
              </button>
            </div>
          </div>
        ))}
        <button
          onClick={addCard}
          style={{ width: "100%", background: "#F2F7FC", border: "2px dashed #B9C8DA", borderRadius: 14, padding: "10px 0", fontSize: 14, fontWeight: 700, color: "#5A6B82", cursor: "pointer" }}
        >
          ＋ カードを追加
        </button>
      </div>

      <div style={{ ...S.card, marginBottom: 12 }}>
        <div style={S.label}>よく使う項目（プリセット）</div>
        <div style={{ fontSize: 12, color: "#7A8698", marginBottom: 8, fontWeight: 700 }}>
          金額が毎月変わるもの（光熱費など）は金額0で登録すると、入力時に金額だけ打てばOK。
        </div>
        {data.presets.map((p) => (

            <span style={{ display: "flex", alignItems: "center", gap: 6, flexWrap: "wrap" }}>
              <GenreTag genre={p.genre} />
              <OwnerDot owner={p.owner} />

            <span style={{ display: "flex", alignItems: "center", gap: 10 }}>

              <button onClick={() => removePreset(p.id)} style={{ ...S.dangerBtn, border: "none", background: "none", padding: "4px 6px" }}>

              key={g.id}

            style={{ background: YELLOW, color: INK, border: `2px solid ${INK}`, borderRadius: 10, padding: "7px 18px", fontSize: 13, fontWeight: 800, cursor: "pointer", boxShadow: "3px 3px 0 rgba(34,50,74,0.2)" }}
          >
            追加
          </button>
        </div>
      </div>
    </div>
  );
}

  return (
    <div style={S.page}>
      <header style={{ padding: "calc(env(safe-area-inset-top, 0px) + 14px) 14px 0" }}>
        <div
          style={{
            background: `linear-gradient(135deg, #FFD84D 0%, ${YELLOW} 100%)`,
            border: `2.5px solid ${INK}`,
            borderRadius: 22,
            padding: "13px 16px",
            display: "flex",
            alignItems: "center",
            gap: 12,
            boxShadow: "6px 6px 0 rgba(34,50,74,0.2)",
          }}
        >
          <div
            aria-hidden
            style={{
              width: 44,
              height: 44,
              borderRadius: 13,
              background: INK,
              border: `2px solid ${INK}`,
              display: "flex",
              flexDirection: "column",
              alignItems: "center",
              justifyContent: "center",
              flexShrink: 0,
            }}
          >
            <span style={{ color: "#fff", fontWeight: 800, fontSize: 20, lineHeight: 1 }}>U</span>
            <span style={{ display: "flex", gap: 2.5, marginTop: 3 }}>
              <span style={{ width: 6, height: 4, borderRadius: 2, background: "#5BD07A" }} />
              <span style={{ width: 6, height: 4, borderRadius: 2, background: "#6FAFF5" }} />
              <span style={{ width: 6, height: 4, borderRadius: 2, background: "#F58BBE" }} />
            </span>
          </div>
          <div>
            <div style={{ fontSize: 19, fontWeight: 800, letterSpacing: "0.02em", color: INK }}>Uchi-no-Kakei</div>
            <div style={{ fontSize: 11, color: "rgba(34,50,74,0.65)", marginTop: 2, fontWeight: 700 }}>
              締め日どおりに集計 ✦ レシートを負担者で分割
            </div>
          </div>
        </div>
      </header>
      {loadError && (
        <div style={{ fontSize: 12, color: "#C24A4A", padding: "8px 18px 0", fontWeight: 700 }}>
          データの読み込みに失敗したため、初期状態で表示しています。電波状況を確認して再読み込みしてください。
        </div>
      )}

      {tab === "input" && <InputTab data={data} mutate={mutate} onSaved={() => showToast("記録しました 🎉")} />}
      {tab === "history" && <HistoryTab data={data} mutate={mutate} />}
      {tab === "settle" && <SettleTab data={data} mutate={mutate} />}
      {tab === "graph" && <GraphTab data={data} />}
      {tab === "settings" && <SettingsTab data={data} mutate={mutate} />}

      {toast && (
        <div
          style={{
            position: "fixed",
            bottom: "calc(env(safe-area-inset-bottom, 0px) + 84px)",
            left: "50%",
            transform: "translateX(-50%)",
            background: INK,
            color: "#fff",
            borderRadius: 999,
            border: "2px solid #fff",
            padding: "10px 22px",
            fontSize: 14,
            fontWeight: 800,
            boxShadow: "0 6px 18px rgba(0,0,0,0.25)",
            zIndex: 20,
            whiteSpace: "nowrap",
          }}
        >
          {toast}
        </div>
      )}

      <nav
        style={{
          position: "fixed",
          bottom: "calc(env(safe-area-inset-bottom, 0px) + 14px)",
          left: 14,
          right: 14,
          maxWidth: 452,
          margin: "0 auto",
          background: "#FFFFFF",
          border: `2.5px solid ${INK}`,
          borderRadius: 999,
          boxShadow: "5px 5px 0 rgba(34,50,74,0.2)",
          display: "flex",
          padding: 5,
          zIndex: 10,
        }}
      >
        {TABS.map((t) => (
          <button
            key={t.id}
            onClick={() => setTab(t.id)}
            style={{
              flex: 1,
              padding: "11px 0",
              border: "none",
              borderRadius: 999,
              background: tab === t.id ? YELLOW : "transparent",
              color: tab === t.id ? INK : "#8A93A3",
              fontSize: 13,
              fontWeight: 800,
              cursor: "pointer",
              fontFamily: "inherit",
            }}
          >
            {t.label}
          </button>
        ))}
      </nav>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
