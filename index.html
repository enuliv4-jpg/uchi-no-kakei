<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">

// ================================================================
// ★★★ ここを書き換えてください（README-setup.md 手順3参照）★★★
// ================================================================
const CONFIG = {
  SUPABASE_URL: "ここにSupabaseのProject URLを貼る",   // 例: https://abcdefgh.supabase.co
  SUPABASE_ANON_KEY: "ここにSupabaseのanon publicキーを貼る",
  // ↓この家計簿の「鍵」。このままでOK（変更する場合は夫婦で同じ値に）
  HOUSEHOLD_ID: "8561b7f7-935c-463e-8b8e-f97210b6ce7b",
};
// ================================================================

const { useState, useEffect, useCallback, useMemo } = React;

// ---------- 定数 ----------
const OWNERS = [
  { id: "home", label: "家", color: "#0E7C66", bg: "#E2F4EF" },
  { id: "me", label: "けんと", color: "#3B4FA0", bg: "#E8ECFA" },
  { id: "wife", label: "みさ", color: "#B0447A", bg: "#FAE7F0" },
];
const ownerOf = (id) => OWNERS.find((o) => o.id === id) || OWNERS[0];

const DEFAULT_DATA = {
  cards: [
    { id: "c1", name: "楽天カード①", closingDay: 27, cardOwner: "me" },
    { id: "c2", name: "三井住友", closingDay: 27, cardOwner: "me" },
    { id: "c3", name: "楽天カード②", closingDay: 27, cardOwner: "wife" },
    { id: "bank", name: "口座引落（家賃・光熱費など）", closingDay: 31, cardOwner: "me" },
  ],
  expenses: [],
  presets: [],
  settlements: {},
};

// ---------- 日付ユーティリティ ----------
const pad = (n) => String(n).padStart(2, "0");
const toISO = (d) => `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`;
const todayISO = () => toISO(new Date());
const daysInMonth = (y, m) => new Date(y, m + 1, 0).getDate();
const fmtMD = (iso) => {
  const [, m, d] = iso.split("-");
  return `${Number(m)}/${Number(d)}`;
};
const fmtYen = (n) => "¥" + Math.round(n).toLocaleString("ja-JP");

function billingPeriod(closingDay, y, m) {
  const endDay = Math.min(closingDay, daysInMonth(y, m));
  const end = new Date(y, m, endDay);
  const pm = m === 0 ? 11 : m - 1;
  const py = m === 0 ? y - 1 : y;
  const prevEndDay = Math.min(closingDay, daysInMonth(py, pm));
  const start = new Date(py, pm, prevEndDay + 1);
  return { start: toISO(start), end: toISO(end) };
}
const inPeriod = (iso, p) => iso >= p.start && iso <= p.end;

// ---------- Supabase ストレージ ----------
const configured = () =>
  CONFIG.SUPABASE_URL.startsWith("https://") && CONFIG.SUPABASE_ANON_KEY.length > 20 && !CONFIG.SUPABASE_ANON_KEY.startsWith("ここに");

async function rpc(fn, body) {
  const headers = {
    "Content-Type": "application/json",
    apikey: CONFIG.SUPABASE_ANON_KEY,
  };
  // 旧形式(JWT)キーの場合のみAuthorizationヘッダーを付ける
  if (CONFIG.SUPABASE_ANON_KEY.startsWith("eyJ")) {
    headers.Authorization = `Bearer ${CONFIG.SUPABASE_ANON_KEY}`;
  }
  const res = await fetch(`${CONFIG.SUPABASE_URL}/rest/v1/rpc/${fn}`, {
    method: "POST",
    headers,
    body: JSON.stringify(body),
  });
  if (!res.ok) throw new Error(`Supabase ${fn} failed: ${res.status}`);
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}

async function loadData() {
  const result = await rpc("get_kakei", { hid: CONFIG.HOUSEHOLD_ID });
  if (result) return { ...DEFAULT_DATA, ...result };
  return DEFAULT_DATA;
}
async function saveData(data) {
  try {
    await rpc("set_kakei", { hid: CONFIG.HOUSEHOLD_ID, payload: data });
    return true;
  } catch (e) {
    console.error("保存に失敗", e);
    return false;
  }
}

// ---------- 共通スタイル ----------
const S = {
  page: {
    fontFamily:
      "'Hiragino Kaku Gothic ProN','Hiragino Sans','Noto Sans JP','Yu Gothic',sans-serif",
    background: "#F2F4F6",
    minHeight: "100vh",
    color: "#1B2430",
    maxWidth: 480,
    margin: "0 auto",
    paddingBottom: 96,
  },
  card: {
    background: "#FFFFFF",
    borderRadius: 14,
    padding: 16,
    margin: "12px 12px 0",
    boxShadow: "0 1px 3px rgba(20,30,50,0.06)",
  },
  label: {
    fontSize: 11,
    fontWeight: 600,
    letterSpacing: "0.08em",
    color: "#7A8494",
    marginBottom: 6,
  },
  input: {
    width: "100%",
    boxSizing: "border-box",
    border: "1.5px solid #DDE2E9",
    borderRadius: 10,
    padding: "10px 12px",
    fontSize: 16,
    background: "#FBFCFD",
    outline: "none",
  },
  btnPrimary: {
    width: "100%",
    background: "#1B2430",
    color: "#fff",
    border: "none",
    borderRadius: 12,
    padding: "14px 0",
    fontSize: 16,
    fontWeight: 700,
    cursor: "pointer",
  },
  chip: (active, color, bg) => ({
    padding: "7px 14px",
    borderRadius: 999,
    fontSize: 14,
    fontWeight: 600,
    border: active ? `2px solid ${color}` : "2px solid #E3E7ED",
    background: active ? bg : "#fff",
    color: active ? color : "#5A6472",
    cursor: "pointer",
    whiteSpace: "nowrap",
  }),
  num: { fontVariantNumeric: "tabular-nums" },
};

function OwnerChips({ value, onChange, size }) {
  return (
    <div style={{ display: "flex", gap: 6 }}>
      {OWNERS.map((o) => (
        <button
          key={o.id}
          onClick={() => onChange(o.id)}
          style={{
            ...S.chip(value === o.id, o.color, o.bg),
            padding: size === "sm" ? "4px 10px" : "7px 14px",
            fontSize: size === "sm" ? 13 : 14,
          }}
        >
          {o.label}
        </button>
      ))}
    </div>
  );
}

function OwnerDot({ owner }) {
  const o = ownerOf(owner);
  return (
    <span
      style={{
        display: "inline-block",
        minWidth: 22,
        textAlign: "center",
        fontSize: 11,
        fontWeight: 700,
        color: o.color,
        background: o.bg,
        borderRadius: 6,
        padding: "2px 5px",
      }}
    >
      {o.label}
    </span>
  );
}

// ---------- 入力タブ ----------
function InputTab({ data, mutate, onSaved }) {
  const [date, setDate] = useState(todayISO());
  const [cardId, setCardId] = useState(data.cards[0] ? data.cards[0].id : "");
  const [store, setStore] = useState("");
  const [lines, setLines] = useState([{ name: "", amount: "", owner: "home" }]);
  const [saving, setSaving] = useState(false);
  const [msg, setMsg] = useState("");

  const total = lines.reduce((s, l) => s + (Number(l.amount) || 0), 0);

  const setLine = (i, patch) =>
    setLines((ls) => ls.map((l, j) => (j === i ? { ...l, ...patch } : l)));
  const addLine = () => setLines((ls) => [...ls, { name: "", amount: "", owner: "home" }]);
  const removeLine = (i) => setLines((ls) => ls.filter((_, j) => j !== i));
  const addPreset = (p) =>
    setLines((ls) => {
      const base = ls.length === 1 && !ls[0].name && !ls[0].amount ? [] : ls;
      return [
        ...base,
        { name: p.name, amount: p.amount > 0 ? String(p.amount) : "", owner: p.owner },
      ];
    });

  const save = async () => {
    const valid = lines.filter((l) => Number(l.amount) > 0);
    if (!cardId) return setMsg("支払い元を選んでください");
    if (valid.length === 0) return setMsg("金額を入力してください");
    setSaving(true);
    const expense = {
      id: "e" + Date.now(),
      date,
      cardId,
      store: store.trim(),
      lines: valid.map((l) => ({
        name: l.name.trim() || "（品名なし）",
        amount: Number(l.amount),
        owner: l.owner,
      })),
    };
    const ok = await mutate((d) => ({ ...d, expenses: [...d.expenses, expense] }));
    setSaving(false);
    if (ok) {
      setStore("");
      setLines([{ name: "", amount: "", owner: "home" }]);
      setMsg("");
      onSaved();
    } else {
      setMsg("保存に失敗しました。通信環境を確認して再度お試しください。");
    }
  };

  return (
    <div>
      <div style={S.card}>
        <div style={S.label}>日付と支払い元</div>
        <input
          type="date"
          value={date}
          onChange={(e) => setDate(e.target.value)}
          style={{ ...S.input, marginBottom: 10 }}
        />
        <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
          {data.cards.map((c) => (
            <button
              key={c.id}
              onClick={() => setCardId(c.id)}
              style={S.chip(cardId === c.id, "#1B2430", "#EEF1F5")}
            >
              {c.name}
            </button>
          ))}
        </div>
        <input
          placeholder="お店・支払い先（例: 無印良品）"
          value={store}
          onChange={(e) => setStore(e.target.value)}
          style={{ ...S.input, marginTop: 10 }}
        />
      </div>

      <div style={S.card}>
        <div style={S.label}>内訳 — 1レシートを負担者ごとに分けられます</div>
        {lines.map((l, i) => (
          <div
            key={i}
            style={{ border: "1px solid #E8ECF1", borderRadius: 10, padding: 10, marginBottom: 8 }}
          >
            <div style={{ display: "flex", gap: 8, marginBottom: 8 }}>
              <input
                placeholder="品名"
                value={l.name}
                onChange={(e) => setLine(i, { name: e.target.value })}
                style={{ ...S.input, flex: 1, padding: "8px 10px", fontSize: 15 }}
              />
              <input
                placeholder="金額"
                type="number"
                inputMode="numeric"
                value={l.amount}
                onChange={(e) => setLine(i, { amount: e.target.value })}
                style={{ ...S.input, width: 100, padding: "8px 10px", fontSize: 15, textAlign: "right" }}
              />
            </div>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <OwnerChips value={l.owner} onChange={(v) => setLine(i, { owner: v })} size="sm" />
              {lines.length > 1 && (
                <button
                  onClick={() => removeLine(i)}
                  style={{ border: "none", background: "none", color: "#B04444", fontSize: 13, cursor: "pointer" }}
                >
                  削除
                </button>
              )}
            </div>
          </div>
        ))}
        <button
          onClick={addLine}
          style={{
            width: "100%",
            background: "#F1F4F8",
            border: "1.5px dashed #C6CFDA",
            borderRadius: 10,
            padding: "9px 0",
            fontSize: 14,
            fontWeight: 600,
            color: "#4A5665",
            cursor: "pointer",
          }}
        >
          ＋ 行を追加
        </button>

        {data.presets.length === 0 && (
          <div style={{ fontSize: 12, color: "#9AA3B0", marginTop: 12 }}>
            💡 繰り返し入力する項目（家賃・光熱費など）は「設定」タブでプリセット登録すると、ここにワンタップボタンが並びます。
          </div>
        )}
        {data.presets.length > 0 && (
          <React.Fragment>
            <div style={{ ...S.label, marginTop: 14 }}>よく使う項目（タップで追加）</div>
            <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
              {data.presets.map((p) => {
                const o = ownerOf(p.owner);
                return (
                  <button
                    key={p.id}
                    onClick={() => addPreset(p)}
                    style={{ ...S.chip(false, o.color, o.bg), borderColor: o.bg, background: o.bg, color: o.color }}
                  >
                    {p.name}
                    {p.amount > 0 ? " " + fmtYen(p.amount) : ""}
                  </button>
                );
              })}
            </div>
          </React.Fragment>
        )}
      </div>

      <div style={{ ...S.card, marginBottom: 12 }}>
        <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 12 }}>
          <span style={{ fontSize: 14, color: "#5A6472" }}>合計</span>
          <span style={{ ...S.num, fontSize: 22, fontWeight: 800 }}>{fmtYen(total)}</span>
        </div>
        {msg && <div style={{ color: "#B04444", fontSize: 13, marginBottom: 8 }}>{msg}</div>}
        <button onClick={save} disabled={saving} style={{ ...S.btnPrimary, opacity: saving ? 0.6 : 1 }}>
          {saving ? "保存中…" : "記録する"}
        </button>
      </div>
    </div>
  );
}

// ---------- 履歴タブ ----------
function HistoryTab({ data, mutate }) {
  const [openId, setOpenId] = useState(null);
  const sorted = useMemo(
    () => [...data.expenses].sort((a, b) => (a.date < b.date ? 1 : -1)),
    [data.expenses]
  );
  const cardName = (id) => {
    const c = data.cards.find((c) => c.id === id);
    return c ? c.name : "不明";
  };
  const del = async (id) => {
    await mutate((d) => ({ ...d, expenses: d.expenses.filter((e) => e.id !== id) }));
  };

  if (sorted.length === 0)
    return (
      <div style={{ ...S.card, textAlign: "center", color: "#7A8494", padding: 32 }}>
        まだ記録がありません。「入力」タブから最初の支出を記録しましょう。
      </div>
    );

  return (
    <div>
      {sorted.map((e) => {
        const total = e.lines.reduce((s, l) => s + l.amount, 0);
        const open = openId === e.id;
        return (
          <div key={e.id} style={{ ...S.card, padding: 0, overflow: "hidden" }}>
            <button
              onClick={() => setOpenId(open ? null : e.id)}
              style={{
                width: "100%",
                background: "none",
                border: "none",
                padding: 14,
                display: "flex",
                justifyContent: "space-between",
                alignItems: "center",
                cursor: "pointer",
                textAlign: "left",
              }}
            >
              <div>
                <div style={{ fontSize: 15, fontWeight: 700 }}>
                  {e.store || "（店名なし）"}
                  <span style={{ marginLeft: 8, display: "inline-flex", gap: 3 }}>
                    {[...new Set(e.lines.map((l) => l.owner))].map((o) => (
                      <OwnerDot key={o} owner={o} />
                    ))}
                  </span>
                </div>
                <div style={{ fontSize: 12, color: "#7A8494", marginTop: 3 }}>
                  {fmtMD(e.date)}・{cardName(e.cardId)}
                </div>
              </div>
              <div style={{ ...S.num, fontSize: 17, fontWeight: 800 }}>{fmtYen(total)}</div>
            </button>
            {open && (
              <div style={{ borderTop: "1px solid #EEF1F5", padding: "10px 14px 14px" }}>
                {e.lines.map((l, i) => (
                  <div
                    key={i}
                    style={{ display: "flex", justifyContent: "space-between", padding: "5px 0", fontSize: 14 }}
                  >
                    <span>
                      <OwnerDot owner={l.owner} /> <span style={{ marginLeft: 6 }}>{l.name}</span>
                    </span>
                    <span style={S.num}>{fmtYen(l.amount)}</span>
                  </div>
                ))}
                <button
                  onClick={() => del(e.id)}
                  style={{
                    marginTop: 8,
                    border: "1px solid #E4C7C7",
                    background: "#FBF1F1",
                    color: "#B04444",
                    borderRadius: 8,
                    padding: "6px 14px",
                    fontSize: 13,
                    cursor: "pointer",
                  }}
                >
                  この記録を削除
                </button>
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

// ---------- 精算タブ ----------
const navBtn = {
  border: "1.5px solid #DDE2E9",
  background: "#fff",
  borderRadius: 10,
  width: 36,
  height: 36,
  fontSize: 18,
  cursor: "pointer",
  color: "#1B2430",
};

function SettleTab({ data, mutate }) {
  const now = new Date();
  const [ym, setYm] = useState({ y: now.getFullYear(), m: now.getMonth() });
  const shift = (d) =>
    setYm(({ y, m }) => {
      const nm = m + d;
      return { y: y + Math.floor(nm / 12), m: ((nm % 12) + 12) % 12 };
    });

  const key = `${ym.y}-${ym.m + 1}`;
  const settled = !!data.settlements[key];

  const perCard = data.cards.map((card) => {
    const p = billingPeriod(card.closingDay, ym.y, ym.m);
    const sums = { home: 0, me: 0, wife: 0, total: 0 };
    data.expenses.forEach((e) => {
      if (e.cardId !== card.id || !inPeriod(e.date, p)) return;
      e.lines.forEach((l) => {
        sums[l.owner] += l.amount;
        sums.total += l.amount;
      });
    });
    return { card, p, sums };
  });

  let wifeOwes = 0,
    iOwe = 0;
  perCard.forEach(({ card, sums }) => {
    if (card.cardOwner === "me") wifeOwes += sums.wife;
    else iOwe += sums.home + sums.me;
  });
  const net = wifeOwes - iOwe;

  const toggleSettled = () =>
    mutate((d) => ({
      ...d,
      settlements: { ...d.settlements, [key]: !d.settlements[key] },
    }));

  return (
    <div>
      <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 18, margin: "14px 0 2px" }}>
        <button onClick={() => shift(-1)} style={navBtn}>‹</button>
        <div style={{ fontSize: 16, fontWeight: 800 }}>
          {ym.y}年{ym.m + 1}月 請求分
        </div>
        <button onClick={() => shift(1)} style={navBtn}>›</button>
      </div>

      <div
        style={{
          ...S.card,
          background: settled ? "#3C6E51" : net >= 0 ? "#1B2430" : "#5A2440",
          color: "#fff",
          textAlign: "center",
          padding: "22px 16px",
        }}
      >
        <div style={{ fontSize: 12, letterSpacing: "0.1em", opacity: 0.8 }}>
          {settled ? "✓ 精算済み" : net >= 0 ? "みさに請求する額" : "みさに支払う額"}
        </div>
        <div style={{ ...S.num, fontSize: 38, fontWeight: 800, margin: "6px 0 4px" }}>
          {fmtYen(Math.abs(net))}
        </div>
        <div style={{ fontSize: 12, opacity: 0.65, marginBottom: 14 }}>
          けんとのカード上のみさ負担 {fmtYen(wifeOwes)} − みさカード上の家・けんと負担 {fmtYen(iOwe)}
        </div>
        <button
          onClick={toggleSettled}
          style={{
            background: settled ? "rgba(255,255,255,0.15)" : "#fff",
            color: settled ? "#fff" : "#1B2430",
            border: settled ? "1.5px solid rgba(255,255,255,0.5)" : "none",
            borderRadius: 999,
            padding: "9px 24px",
            fontSize: 14,
            fontWeight: 700,
            cursor: "pointer",
          }}
        >
          {settled ? "精算済みを取り消す" : "精算済みにする"}
        </button>
      </div>

      {perCard.map(({ card, p, sums }) => (
        <div key={card.id} style={S.card}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline" }}>
            <div style={{ fontSize: 15, fontWeight: 700 }}>{card.name}</div>
            <div style={{ ...S.num, fontSize: 16, fontWeight: 800 }}>{fmtYen(sums.total)}</div>
          </div>
          <div style={{ fontSize: 12, color: "#7A8494", margin: "3px 0 10px" }}>
            {fmtMD(p.start)} 〜 {fmtMD(p.end)}（{card.closingDay === 31 ? "月末" : card.closingDay + "日"}締め）
          </div>
          <div style={{ display: "flex", gap: 8 }}>
            {OWNERS.map((o) => (
              <div
                key={o.id}
                style={{ flex: 1, background: o.bg, borderRadius: 10, padding: "8px 0", textAlign: "center" }}
              >
                <div style={{ fontSize: 11, fontWeight: 700, color: o.color }}>{o.label}</div>
                <div style={{ ...S.num, fontSize: 14, fontWeight: 800, color: o.color }}>
                  {fmtYen(sums[o.id])}
                </div>
              </div>
            ))}
          </div>
        </div>
      ))}
      <div style={{ height: 12 }} />
    </div>
  );
}

// ---------- グラフタブ（軽量CSS積み上げ棒グラフ） ----------
function GraphTab({ data }) {
  const chartData = useMemo(() => {
    const now = new Date();
    const months = [];
    for (let i = 5; i >= 0; i--) {
      const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
      months.push({ y: d.getFullYear(), m: d.getMonth(), label: `${d.getMonth() + 1}月`, home: 0, me: 0, wife: 0 });
    }
    data.expenses.forEach((e) => {
      const [ey, em] = e.date.split("-").map(Number);
      const bucket = months.find((mo) => mo.y === ey && mo.m === em - 1);
      if (!bucket) return;
      e.lines.forEach((l) => {
        bucket[l.owner in bucket ? l.owner : "home"] += l.amount;
      });
    });
    return months;
  }, [data.expenses]);

  const maxTotal = Math.max(1, ...chartData.map((mo) => mo.home + mo.me + mo.wife));
  const last = chartData[chartData.length - 1];
  const totalThisMonth = last ? last.home + last.me + last.wife : 0;
  const CHART_H = 190;

  return (
    <div>
      <div style={S.card}>
        <div style={S.label}>今月の支出合計（暦月）</div>
        <div style={{ ...S.num, fontSize: 28, fontWeight: 800 }}>{fmtYen(totalThisMonth)}</div>
      </div>

      <div style={S.card}>
        <div style={S.label}>月別の支出（負担者別・直近6か月）</div>
        <div style={{ display: "flex", alignItems: "flex-end", gap: 10, height: CHART_H, marginTop: 12 }}>
          {chartData.map((mo, i) => {
            const total = mo.home + mo.me + mo.wife;
            return (
              <div key={i} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", height: "100%" }}>
                <div style={{ ...S.num, fontSize: 10, color: "#7A8494", marginBottom: 4 }}>
                  {total > 0 ? (total >= 10000 ? Math.round(total / 1000) / 10 + "万" : total.toLocaleString()) : ""}
                </div>
                <div style={{ flex: 1, width: "100%", maxWidth: 40, display: "flex", flexDirection: "column", justifyContent: "flex-end" }}>
                  {["wife", "me", "home"].map((oid, j) => {
                    const h = (mo[oid] / maxTotal) * (CHART_H - 24);
                    if (h <= 0) return null;
                    const o = ownerOf(oid);
                    return (
                      <div
                        key={oid}
                        style={{
                          height: h,
                          background: o.color,
                          borderRadius: j === 0 && mo.wife > 0 ? "4px 4px 0 0" : 0,
                        }}
                      />
                    );
                  })}
                </div>
              </div>
            );
          })}
        </div>
        <div style={{ display: "flex", gap: 10, marginTop: 2 }}>
          {chartData.map((mo, i) => (
            <div key={i} style={{ flex: 1, textAlign: "center", fontSize: 12, color: "#5A6472", fontWeight: 600 }}>
              {mo.label}
            </div>
          ))}
        </div>
        <div style={{ display: "flex", justifyContent: "center", gap: 14, marginTop: 12 }}>
          {OWNERS.map((o) => (
            <span key={o.id} style={{ fontSize: 12, color: "#5A6472", display: "flex", alignItems: "center", gap: 4 }}>
              <span style={{ width: 10, height: 10, borderRadius: 3, background: o.color, display: "inline-block" }} />
              {o.label}
            </span>
          ))}
        </div>
        <div style={{ fontSize: 11, color: "#9AA3B0", marginTop: 10 }}>
          ※グラフは暦月（1日〜月末）で集計。カードの請求額は「精算」タブで締め日どおりに確認できます。
        </div>
      </div>
    </div>
  );
}

// ---------- 設定タブ ----------
function SettingsTab({ data, mutate }) {
  const [newPreset, setNewPreset] = useState({ name: "", amount: "", owner: "home" });

  const updateCard = (id, patch) =>
    mutate((d) => ({
      ...d,
      cards: d.cards.map((c) => (c.id === id ? { ...c, ...patch } : c)),
    }));
  const addCard = () =>
    mutate((d) => ({
      ...d,
      cards: [
        ...d.cards,
        { id: "c" + Date.now(), name: "新しいカード", closingDay: 27, cardOwner: "me" },
      ],
    }));
  const removeCard = (id) =>
    mutate((d) => ({ ...d, cards: d.cards.filter((c) => c.id !== id) }));

  const addPreset = () => {
    if (!newPreset.name.trim()) return;
    mutate((d) => ({
      ...d,
      presets: [
        ...d.presets,
        {
          id: "p" + Date.now(),
          name: newPreset.name.trim(),
          amount: Number(newPreset.amount) || 0,
          owner: newPreset.owner,
        },
      ],
    }));
    setNewPreset({ name: "", amount: "", owner: "home" });
  };
  const removePreset = (id) =>
    mutate((d) => ({ ...d, presets: d.presets.filter((p) => p.id !== id) }));

  return (
    <div>
      <div style={S.card}>
        <div style={S.label}>支払い元と締め日</div>
        {data.cards.map((c) => (
          <div key={c.id} style={{ border: "1px solid #E8ECF1", borderRadius: 10, padding: 10, marginBottom: 8 }}>
            <input
              value={c.name}
              onChange={(e) => updateCard(c.id, { name: e.target.value })}
              style={{ ...S.input, marginBottom: 8, fontSize: 15, padding: "8px 10px" }}
            />
            <div style={{ display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
              <span style={{ fontSize: 13, color: "#5A6472" }}>締め日</span>
              <select
                value={c.closingDay}
                onChange={(e) => updateCard(c.id, { closingDay: Number(e.target.value) })}
                style={{ ...S.input, width: 90, padding: "6px 8px", fontSize: 15 }}
              >
                {Array.from({ length: 31 }, (_, i) => i + 1).map((d) => (
                  <option key={d} value={d}>
                    {d === 31 ? "月末" : d + "日"}
                  </option>
                ))}
              </select>
              <span style={{ fontSize: 13, color: "#5A6472" }}>名義</span>
              <select
                value={c.cardOwner}
                onChange={(e) => updateCard(c.id, { cardOwner: e.target.value })}
                style={{ ...S.input, width: 90, padding: "6px 8px", fontSize: 15 }}
              >
                <option value="me">けんと</option>
                <option value="wife">みさ</option>
              </select>
              <button
                onClick={() => removeCard(c.id)}
                style={{ marginLeft: "auto", border: "none", background: "none", color: "#B04444", fontSize: 13, cursor: "pointer" }}
              >
                削除
              </button>
            </div>
          </div>
        ))}
        <button
          onClick={addCard}
          style={{ width: "100%", background: "#F1F4F8", border: "1.5px dashed #C6CFDA", borderRadius: 10, padding: "9px 0", fontSize: 14, fontWeight: 600, color: "#4A5665", cursor: "pointer" }}
        >
          ＋ 支払い元を追加
        </button>
      </div>

      <div style={{ ...S.card, marginBottom: 12 }}>
        <div style={S.label}>よく使う項目（プリセット）</div>
        <div style={{ fontSize: 12, color: "#7A8494", marginBottom: 8 }}>
          金額が毎月変わるもの（光熱費など）は金額0で登録すると、入力時に金額だけ打てばOK。
        </div>
        {data.presets.map((p) => (
          <div key={p.id} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "7px 0", fontSize: 14, borderBottom: "1px solid #F0F2F5" }}>
            <span>
              <OwnerDot owner={p.owner} /> <span style={{ marginLeft: 6 }}>{p.name}</span>
            </span>
            <span style={{ display: "flex", alignItems: "center", gap: 10 }}>
              <span style={S.num}>{p.amount > 0 ? fmtYen(p.amount) : "金額は入力時"}</span>
              <button onClick={() => removePreset(p.id)} style={{ border: "none", background: "none", color: "#B04444", fontSize: 13, cursor: "pointer" }}>
                削除
              </button>
            </span>
          </div>
        ))}
        <div style={{ display: "flex", gap: 6, marginTop: 10 }}>
          <input
            placeholder="品名"
            value={newPreset.name}
            onChange={(e) => setNewPreset((s) => ({ ...s, name: e.target.value }))}
            style={{ ...S.input, flex: 1, padding: "8px 10px", fontSize: 14 }}
          />
          <input
            placeholder="金額（任意）"
            type="number"
            inputMode="numeric"
            value={newPreset.amount}
            onChange={(e) => setNewPreset((s) => ({ ...s, amount: e.target.value }))}
            style={{ ...S.input, width: 110, padding: "8px 10px", fontSize: 14, textAlign: "right" }}
          />
        </div>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: 8 }}>
          <OwnerChips
            value={newPreset.owner}
            onChange={(v) => setNewPreset((s) => ({ ...s, owner: v }))}
            size="sm"
          />
          <button
            onClick={addPreset}
            style={{ background: "#1B2430", color: "#fff", border: "none", borderRadius: 8, padding: "7px 16px", fontSize: 13, fontWeight: 700, cursor: "pointer" }}
          >
            追加
          </button>
        </div>
      </div>
    </div>
  );
}

// ---------- セットアップ未完了画面 ----------
function SetupScreen() {
  return (
    <div style={{ ...S.page, padding: 20, boxSizing: "border-box" }}>
      <div style={{ ...S.card, margin: "40px 0 0" }}>
        <div style={{ fontSize: 18, fontWeight: 800, marginBottom: 10 }}>あと少しで完成です</div>
        <div style={{ fontSize: 14, lineHeight: 1.8, color: "#3A4452" }}>
          index.html の先頭にある <b>CONFIG</b> に、Supabase の <b>Project URL</b> と{" "}
          <b>anon public キー</b>がまだ設定されていません。
          <br />
          <br />
          README-setup.md の手順3を見て、GitHub 上で index.html を編集し、2つの値を貼り付けてください。
        </div>
      </div>
    </div>
  );
}

// ---------- ルート ----------
function App() {
  const [data, setData] = useState(null);
  const [tab, setTab] = useState("input");
  const [toast, setToast] = useState("");
  const [loadError, setLoadError] = useState(false);

  useEffect(() => {
    if (!configured()) return;
    loadData()
      .then(setData)
      .catch(() => {
        setData(DEFAULT_DATA);
        setLoadError(true);
      });
  }, []);

  const mutate = useCallback(async (fn) => {
    let next;
    setData((d) => (next = fn(d)));
    const ok = await saveData(next);
    return ok;
  }, []);

  const showToast = (t) => {
    setToast(t);
    setTimeout(() => setToast(""), 2000);
  };

  if (!configured()) return <SetupScreen />;

  if (!data)
    return (
      <div style={{ ...S.page, display: "flex", alignItems: "center", justifyContent: "center", minHeight: "100vh" }}>
        <div style={{ color: "#7A8494", fontSize: 14 }}>読み込み中…</div>
      </div>
    );

  const TABS = [
    { id: "input", label: "入力" },
    { id: "history", label: "履歴" },
    { id: "settle", label: "精算" },
    { id: "graph", label: "グラフ" },
    { id: "settings", label: "設定" },
  ];

  return (
    <div style={S.page}>
      <header style={{ padding: "calc(env(safe-area-inset-top, 0px) + 18px) 16px 4px", display: "flex", alignItems: "center", gap: 10 }}>
        <img src="icon-192.png" alt="" style={{ width: 40, height: 40, borderRadius: 11 }} />
        <div>
          <div style={{ fontSize: 19, fontWeight: 800, letterSpacing: "0.01em" }}>Uchi-no-Kakei</div>
          <div style={{ fontSize: 11, color: "#7A8494", marginTop: 1 }}>
            締め日どおりに集計・1レシートを負担者で分割
          </div>
        </div>
      </header>
      {loadError && (
        <div style={{ fontSize: 12, color: "#B04444", padding: "4px 16px" }}>
          データの読み込みに失敗したため、初期状態で表示しています。電波状況を確認して再読み込みしてください。
        </div>
      )}

      {tab === "input" && <InputTab data={data} mutate={mutate} onSaved={() => showToast("記録しました")} />}
      {tab === "history" && <HistoryTab data={data} mutate={mutate} />}
      {tab === "settle" && <SettleTab data={data} mutate={mutate} />}
      {tab === "graph" && <GraphTab data={data} />}
      {tab === "settings" && <SettingsTab data={data} mutate={mutate} />}

      {toast && (
        <div
          style={{
            position: "fixed",
            bottom: 90,
            left: "50%",
            transform: "translateX(-50%)",
            background: "#1B2430",
            color: "#fff",
            borderRadius: 999,
            padding: "9px 20px",
            fontSize: 14,
            fontWeight: 600,
            boxShadow: "0 4px 14px rgba(0,0,0,0.2)",
            zIndex: 20,
          }}
        >
          {toast}
        </div>
      )}

      <nav
        style={{
          position: "fixed",
          bottom: 0,
          left: 0,
          right: 0,
          maxWidth: 480,
          margin: "0 auto",
          background: "#fff",
          borderTop: "1px solid #E8ECF1",
          display: "flex",
          zIndex: 10,
          paddingBottom: "env(safe-area-inset-bottom, 0px)",
        }}
      >
        {TABS.map((t) => (
          <button
            key={t.id}
            onClick={() => setTab(t.id)}
            style={{
              flex: 1,
              padding: "13px 0 15px",
              border: "none",
              background: "none",
              fontSize: 13,
              fontWeight: tab === t.id ? 800 : 600,
              color: tab === t.id ? "#1B2430" : "#9AA3B0",
              borderTop: tab === t.id ? "2.5px solid #1B2430" : "2.5px solid transparent",
              cursor: "pointer",
            }}
          >
            {t.label}
          </button>
        ))}
      </nav>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
